name: Unity EditMode Matrix

on:
  workflow_dispatch:

jobs:
  unity-editmode:
    name: Unity ${{ matrix.unityLine }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - unityLine: "6000.2"
          - unityLine: "6000.3"
          - unityLine: "6000.5"
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Unity editor path
        id: unity
        shell: pwsh
        env:
          UNITY_EDITOR_6000_2: ${{ secrets.UNITY_EDITOR_6000_2 }}
          UNITY_EDITOR_6000_3: ${{ secrets.UNITY_EDITOR_6000_3 }}
          UNITY_EDITOR_6000_5: ${{ secrets.UNITY_EDITOR_6000_5 }}
        run: |
          $line = "${{ matrix.unityLine }}"
          $key = "UNITY_EDITOR_" + ($line -replace '\.', '_')
          $path = [Environment]::GetEnvironmentVariable($key)
          if ([string]::IsNullOrWhiteSpace($path) -or -not (Test-Path $path)) {
            Write-Warning "$key not configured or editor missing — skipping."
            "skip=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }
          "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "path=$path" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "UNITY_EDITOR_PATH=$path" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Run EditMode and PlayMode tests
        if: steps.unity.outputs.skip != 'true'
        shell: pwsh
        run: |
          ./scripts/test/run-unity.ps1 -UnityLine "${{ matrix.unityLine }}" -ProjectPath "." -TestPlatform both

      - name: Upload test results
        if: always() && steps.unity.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results-${{ matrix.unityLine }}
          path: TestResults/
          if-no-files-found: ignore
